type: postgresql
mode: standalone
cluster:
  instances: 2
  storage:
    size: 256Mi
    storageClass: standard
backups:
  enabled: false
poolers:
  - name: rw
    type: rw
    instances: 2
    poolMode: transaction
    clientTLSSecret:
      name: pgbouncer-client-tls
    clientCASecret:
      name: pgbouncer-client-ca
    serverTLSSecret:
      name: pgbouncer-server-tls
    serverCASecret:
      name: pgbouncer-server-ca
  - name: ro
    type: ro
    instances: 2
