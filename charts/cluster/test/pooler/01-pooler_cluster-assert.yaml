apiVersion: apps/v1
kind: Deployment
metadata:
  name: pooler-cluster-pooler-rw
status:
  readyReplicas: 2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pooler-cluster-pooler-ro
status:
  readyReplicas: 2
---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: pooler-cluster-pooler-rw
spec:
  cluster:
    name: pooler-cluster
  instances: 2
  pgbouncer:
    clientTLSSecret:
      name: pgbouncer-client-tls
    clientCASecret:
      name: pgbouncer-client-ca
    serverTLSSecret:
      name: pgbouncer-server-tls
    serverCASecret:
      name: pgbouncer-server-ca
    poolMode: transaction
  type: rw
---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: pooler-cluster-pooler-ro
spec:
  cluster:
    name: pooler-cluster
  instances: 2
  pgbouncer:
    poolMode: session
  type: ro
